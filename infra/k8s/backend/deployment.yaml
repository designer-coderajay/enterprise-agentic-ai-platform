apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-backend
  namespace: agentic-ai
  labels:
    app: agentic-backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentic-backend
  template:
    metadata:
      labels:
        app: agentic-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: backend
          image: your-ecr-registry/agentic-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: database-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-backend-svc
  namespace: agentic-ai
spec:
  selector:
    app: agentic-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
